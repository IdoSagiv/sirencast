<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>SirenCast</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 480px;
  padding: 16px;
}
/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid #333;
  margin-bottom: 16px;
}
.header h1 {
  font-size: 1.3rem;
  font-weight: 700;
}
.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #888;
  flex-shrink: 0;
}
.status-dot.cat10 {
  background: #f59e0b;
  animation: pulse 1.5s ease-in-out infinite;
}
.status-dot.cat1 {
  background: #ef4444;
  animation: pulse 0.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}
.header-subtitle {
  font-size: 0.85rem;
  color: #aaa;
  margin-right: auto;
}
/* Area picker */
.area-picker {
  margin-bottom: 20px;
  position: relative;
}
.area-picker label {
  display: block;
  font-size: 0.9rem;
  color: #aaa;
  margin-bottom: 6px;
}
.area-picker input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: #fff;
  font-size: 1rem;
  outline: none;
}
.area-picker input:focus {
  border-color: #555;
}
.dropdown-list {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  left: 0;
  z-index: 100;
  background: #1e1e1e;
  border: 1px solid #444;
  border-radius: 8px;
  max-height: 220px;
  overflow-y: auto;
  margin-top: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
.dropdown-list.open {
  display: block;
}
.dropdown-item {
  padding: 10px 12px;
  font-size: 0.95rem;
  cursor: pointer;
  border-bottom: 1px solid #2a2a2a;
}
.dropdown-item:last-child {
  border-bottom: none;
}
.dropdown-item:hover, .dropdown-item.active {
  background: #2a2a2a;
}
.dropdown-empty {
  padding: 10px 12px;
  font-size: 0.9rem;
  color: #888;
  text-align: center;
}
/* Results */
#results {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 16px;
  min-height: 60px;
}
.placeholder-text {
  color: #888;
  text-align: center;
  padding: 20px 0;
}
.summary-line {
  font-size: 0.95rem;
  color: #ccc;
  margin-bottom: 12px;
}
.area-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #222;
}
.area-row:last-child {
  border-bottom: none;
}
.area-row.highlighted {
  font-weight: 700;
  border-right: 3px solid #f59e0b;
  padding-right: 8px;
}
.area-name {
  flex: 1;
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* Idle area stat card */
.idle-stat-card {
  padding: 4px 0;
}
.idle-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}
.idle-stat-label {
  font-size: 0.9rem;
  color: #aaa;
}
.idle-stat-value {
  font-size: 0.9rem;
  color: #ccc;
  font-weight: 600;
  direction: ltr;
}
.idle-stat-divider {
  border-top: 1px solid #2a2a2a;
  margin: 10px 0;
}
.idle-stat-main-label {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 6px;
}
.idle-stat-big {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  line-height: 1.1;
}
.idle-stat-pct {
  font-size: 1rem;
  font-weight: 600;
  opacity: 0.8;
  margin-top: 2px;
  direction: ltr;
}
.area-fraction {
  font-size: 0.8rem;
  color: #aaa;
  white-space: nowrap;
  min-width: 50px;
  text-align: center;
}
.progress-bar {
  width: 90px;
  height: 8px;
  background: #333;
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.alert-box {
  background: #ef4444;
  color: #fff;
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 12px;
}
.siren-area-list {
  list-style: none;
  padding: 0;
}
.siren-area-list li {
  padding: 6px 0;
  border-bottom: 1px solid #222;
  font-size: 0.9rem;
}
/* History */
#history-section {
  margin-top: 20px;
}
.history-header {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.history-header span {
  color: #ccc;
  font-weight: 600;
}
.history-empty {
  color: #555;
  font-size: 0.85rem;
  text-align: center;
  padding: 12px 0;
}
.history-item {
  background: #1a1a1a;
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}
.history-item-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}
.history-item-header:hover {
  background: #222;
}
.history-date {
  font-size: 0.85rem;
  color: #aaa;
  flex: 1;
  direction: ltr;
  text-align: right;
}
.history-siren-badge {
  font-size: 0.8rem;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.history-siren-badge.yes {
  background: #7f1d1d;
  color: #fca5a5;
}
.history-siren-badge.no {
  background: #1a2e1a;
  color: #86efac;
}
.history-areas-count {
  font-size: 0.8rem;
  color: #666;
  white-space: nowrap;
}
.history-chevron {
  font-size: 0.75rem;
  color: #555;
  transition: transform 0.2s;
}
.history-item.open .history-chevron {
  transform: rotate(180deg);
}
.history-detail {
  display: none;
  padding: 0 12px 12px;
  border-top: 1px solid #222;
}
.history-item.open .history-detail {
  display: block;
}
.history-detail-label {
  font-size: 0.75rem;
  color: #666;
  margin: 8px 0 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.history-area-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.history-area-tag {
  font-size: 0.78rem;
  padding: 2px 7px;
  border-radius: 10px;
  background: #252525;
  color: #bbb;
}
.history-area-tag.siren {
  background: #7f1d1d;
  color: #fca5a5;
}
.history-area-tag.selected {
  border: 1px solid #f59e0b;
  color: #fde68a;
}
/* Prediction badge */
.pred-badge {
  font-size: 0.78rem;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 600;
  white-space: nowrap;
  direction: ltr;
}
.pred-unknown {
  background: #222;
  color: #555;
}
.pred-low {
  background: #14532d;
  color: #86efac;
}
.pred-mid {
  background: #78350f;
  color: #fde68a;
}
.pred-high {
  background: #7f1d1d;
  color: #fca5a5;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="status-dot" id="status-dot"></span>
    <h1>🚨 SirenCast</h1>
    <span class="header-subtitle" id="header-subtitle"></span>
  </div>
  <div id="conn-error" style="display:none;background:#7f1d1d;color:#fca5a5;border-radius:6px;padding:8px 12px;font-size:0.8rem;margin-bottom:12px;text-align:center;">
    ⚠️ בעיית חיבור — מנסה להתחבר מחדש...
  </div>
  <div class="area-picker" id="area-picker">
    <label for="area-input">בחר אזור התראה</label>
    <input id="area-input" placeholder="הקלד לחיפוש אזור..." autocomplete="off" readonly>
    <div class="dropdown-list" id="dropdown-list"></div>
    <div id="no-areas-note" style="display:none;font-size:0.8rem;color:#888;margin-top:6px;">
      עדיין אין נתונים — הcollector צריך לרוץ כדי לאכלס את רשימת האזורים
    </div>
  </div>
  <div id="results">
    <div class="placeholder-text">אין התראה פעילה כרגע</div>
  </div>
  <div id="last-updated" style="text-align:center;font-size:0.75rem;color:#555;margin-top:10px;"></div>
  <div id="history-section" style="display:none;">
    <div class="history-header">📋 היסטוריה — <span id="history-area-label"></span></div>
    <div id="history-list"></div>
  </div>
</div>
<script>
const STORAGE_KEY = 'sirencast_area';
const areaInput = document.getElementById('area-input');
const dropdownList = document.getElementById('dropdown-list');
const statusDot = document.getElementById('status-dot');
const headerSubtitle = document.getElementById('header-subtitle');
const resultsDiv = document.getElementById('results');

let lastAreasKey = '';
let lastIdleArea = null;
let pollErrors = 0;
let lastPollTime = null;
let allAreas = [];

function renderDropdown(filter) {
  const q = (filter || '').trim().toLowerCase();
  const matches = q ? allAreas.filter(a => a.toLowerCase().includes(q)) : allAreas;
  if (matches.length === 0) {
    dropdownList.innerHTML = `<div class="dropdown-empty">${q ? 'לא נמצאו תוצאות' : 'עדיין אין אזורים'}</div>`;
  } else {
    dropdownList.innerHTML = matches.map(a =>
      `<div class="dropdown-item" data-value="${a}">${a}</div>`
    ).join('');
  }
}

function openDropdown() {
  // Switch to editable mode for filtering
  areaInput.removeAttribute('readonly');
  areaInput.value = '';
  renderDropdown('');
  dropdownList.classList.add('open');
}

function closeDropdown(restoreValue) {
  dropdownList.classList.remove('open');
  areaInput.setAttribute('readonly', '');
  if (restoreValue !== undefined) {
    areaInput.value = restoreValue;
  } else {
    areaInput.value = getUserArea();
  }
}

function selectArea(value) {
  localStorage.setItem(STORAGE_KEY, value);
  closeDropdown(value);
}

areaInput.addEventListener('click', () => {
  if (dropdownList.classList.contains('open')) {
    closeDropdown();
  } else {
    openDropdown();
  }
});

areaInput.addEventListener('input', () => {
  renderDropdown(areaInput.value);
  if (!dropdownList.classList.contains('open')) dropdownList.classList.add('open');
});

dropdownList.addEventListener('mousedown', (e) => {
  const item = e.target.closest('.dropdown-item');
  if (item) selectArea(item.dataset.value);
});

document.addEventListener('mousedown', (e) => {
  if (!document.getElementById('area-picker').contains(e.target)) {
    closeDropdown();
  }
});

async function loadAreas() {
  try {
    const res = await fetch('/api/areas');
    const data = await res.json();
    allAreas = data.areas || [];
    document.getElementById('no-areas-note').style.display = allAreas.length === 0 ? 'block' : 'none';
  } catch (e) {
    console.error('Failed to load areas:', e);
  }
}

function restoreSelection() {
  const saved = localStorage.getItem(STORAGE_KEY);
  areaInput.value = saved || '';
}

function getUserArea() {
  return localStorage.getItem(STORAGE_KEY) || '';
}

function getProgressColor(pct) {
  if (pct > 50) return '#ef4444';
  if (pct > 20) return '#f59e0b';
  return '#22c55e';
}

function renderIdle(areaStats) {
  statusDot.className = 'status-dot';
  headerSubtitle.textContent = '';
  if (!areaStats || areaStats.total_incidents === 0) {
    const msg = areaStats ? 'האזור שנבחר לא הופיע באף אזהרה מתועדת' : 'אין התראה פעילה כרגע';
    resultsDiv.innerHTML = `<div class="placeholder-text">${msg}</div>`;
    return;
  }
  const s = areaStats;
  const pct = s.area_siren_pct;
  const color = pct > 50 ? '#ef4444' : pct > 20 ? '#f59e0b' : '#22c55e';
  const pctLabel = s.total_incidents > 0 ? `${pct}%` : '';
  resultsDiv.innerHTML = `
    <div class="idle-stat-card">
      <div class="idle-stat-row">
        <span class="idle-stat-label">הופיע באזהרות מוקדמות</span>
        <span class="idle-stat-value">${s.total_incidents}</span>
      </div>
      <div class="idle-stat-divider"></div>
      <div class="idle-stat-main-label">קיבל אזעקה ספציפית לאזור</div>
      <div class="idle-stat-big" style="color:${color}" dir="ltr">${s.area_siren_count} / ${s.total_incidents}</div>
      <div class="idle-stat-pct" style="color:${color}">${pctLabel}</div>
      <div class="progress-bar" style="width:100%;margin-top:8px;">
        <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
}

function renderCat10(areas, historyData) {
  statusDot.className = 'status-dot cat10';
  headerSubtitle.textContent = `אזהרה מוקדמת — ${areas.length} אזורים`;

  const userArea = getUserArea();
  const total = historyData.total_matching_incidents;
  let counts = historyData.counts || [];

  let html = '';
  if (total === 0) {
    html += '<div class="summary-line">אין נתונים היסטוריים עדיין</div>';
  } else {
    html += `<div class="summary-line">נמצאו ${total} אירועים תואמים</div>`;
  }

  // Ensure user's area is present and shown first
  let userEntry = counts.find(c => c.area === userArea);
  let otherEntries = counts.filter(c => c.area !== userArea);
  let ordered = [];
  if (userArea && areas.includes(userArea)) {
    if (!userEntry) userEntry = { area: userArea, count: 0, pct: 0 };
    ordered = [userEntry, ...otherEntries];
  } else {
    ordered = counts;
  }

  for (const item of ordered) {
    const isHighlighted = item.area === userArea;
    const pct = total > 0 ? item.pct : 0;
    const color = getProgressColor(pct);
    html += `
      <div class="area-row${isHighlighted ? ' highlighted' : ''}">
        <span class="area-name">${item.area}</span>
        <span class="area-fraction" dir="ltr">${item.count}/${total}</span>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
  }

  resultsDiv.innerHTML = html;
}

function renderCat1(areas) {
  statusDot.className = 'status-dot cat1';
  headerSubtitle.textContent = `אזעקה! — ${areas.length} אזורים`;

  const userArea = getUserArea();
  let html = '';

  if (userArea && areas.includes(userArea)) {
    html += '<div class="alert-box">🚨 האזור שלך בסכנה!</div>';
  }

  html += '<ul class="siren-area-list">';
  for (const area of areas) {
    html += `<li>${area}</li>`;
  }
  html += '</ul>';

  resultsDiv.innerHTML = html;
}

async function fetchHistory(areas) {
  try {
    const res = await fetch('/api/history?areas=' + encodeURIComponent(areas.join(',')));
    return await res.json();
  } catch (e) {
    console.error('Failed to fetch history:', e);
    return { total_matching_incidents: 0, counts: [] };
  }
}

async function pollLive() {
  try {
    const res = await fetch('/api/live');
    const data = await res.json();
    pollErrors = 0;
    document.getElementById('conn-error').style.display = 'none';
    lastPollTime = Date.now();

    if (!data.active) {
      lastAreasKey = '';
      const userArea = getUserArea();
      if (userArea !== lastIdleArea) {
        lastIdleArea = userArea;
        if (userArea) {
          const statsRes = await fetch('/api/area-stats?area=' + encodeURIComponent(userArea));
          const stats = await statsRes.json();
          renderIdle(stats);
        } else {
          renderIdle(null);
        }
      }
      return;
    }
    lastIdleArea = null;

    if (data.cat === '10') {
      const areasKey = data.areas.join(',');
      if (areasKey !== lastAreasKey) {
        lastAreasKey = areasKey;
        const history = await fetchHistory(data.areas);
        renderCat10(data.areas, history);
      }
    } else if (data.cat === '1') {
      lastAreasKey = '';
      renderCat1(data.areas);
    }
  } catch (e) {
    console.error('Poll error:', e);
    pollErrors++;
    if (pollErrors >= 3) {
      document.getElementById('conn-error').style.display = 'block';
    }
  }
}

// ── History ──────────────────────────────────────────────
function formatTs(ts) {
  const d = new Date(ts * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getDate()}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderHistory(incidents, selectedArea) {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  document.getElementById('history-area-label').textContent = selectedArea;

  if (!incidents || incidents.length === 0) {
    section.style.display = 'block';
    list.innerHTML = '<div class="history-empty">אין אירועים מתועדים עדיין לאזור זה</div>';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = incidents.map((inc, idx) => {
    const dateStr = formatTs(inc.started_at);
    const sirenClass = inc.had_siren ? 'yes' : 'no';
    const sirenText = inc.had_siren ? '🚨 אזעקה' : '✅ ללא אזעקה';
    const areasCount = `${inc.cat10_areas.length} אזורים`;

    const pred = inc.prediction;
    let predHtml = '';
    if (pred.total === 0) {
      predHtml = `<span class="pred-badge pred-unknown" title="אין נתונים היסטוריים קודמים">—</span>`;
    } else {
      const pct = Math.round(pred.count / pred.total * 100);
      const predClass = pct > 50 ? 'pred-high' : pct > 20 ? 'pred-mid' : 'pred-low';
      predHtml = `<span class="pred-badge ${predClass}" title="הסיכוי שחושב בזמן האזהרה">${pred.count}/${pred.total}</span>`;
    }

    const cat10Tags = inc.cat10_areas.map(a => {
      const cls = a === selectedArea ? 'selected' : '';
      return `<span class="history-area-tag ${cls}">${a}</span>`;
    }).join('');

    const cat1Tags = inc.had_siren
      ? inc.cat1_areas.map(a => {
          const cls = a === selectedArea ? 'selected' : 'siren';
          return `<span class="history-area-tag ${cls}">${a}</span>`;
        }).join('')
      : '<span style="color:#555;font-size:0.8rem;">—</span>';

    return `
      <div class="history-item" id="hinc-${idx}">
        <div class="history-item-header" onclick="toggleHistory(${idx})">
          <span class="history-siren-badge ${sirenClass}">${sirenText}</span>
          ${predHtml}
          <span class="history-areas-count">${areasCount} באזהרה</span>
          <span class="history-date">${dateStr}</span>
          <span class="history-chevron">▼</span>
        </div>
        <div class="history-detail">
          <div class="history-detail-label">אזורים באזהרה המוקדמת</div>
          <div class="history-area-tags">${cat10Tags}</div>
          <div class="history-detail-label">אזורים שקיבלו אזעקה</div>
          <div class="history-area-tags">${cat1Tags}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleHistory(idx) {
  document.getElementById(`hinc-${idx}`).classList.toggle('open');
}

async function loadHistory(area) {
  if (!area) {
    document.getElementById('history-section').style.display = 'none';
    return;
  }
  try {
    const res = await fetch('/api/incidents?area=' + encodeURIComponent(area));
    const data = await res.json();
    renderHistory(data.incidents, area);
  } catch (e) {
    console.error('Failed to load history:', e);
  }
}

// Trigger history + stats reload when area is selected
const _origSelectArea = selectArea;
selectArea = function(value) {
  _origSelectArea(value);
  lastIdleArea = null; // force stats refresh on next poll
  loadHistory(value);
};

loadAreas();
restoreSelection();
loadHistory(getUserArea());
setInterval(pollLive, 1000);
pollLive();
setInterval(() => {
  const el = document.getElementById('last-updated');
  if (!lastPollTime) return;
  const sec = Math.round((Date.now() - lastPollTime) / 1000);
  el.textContent = sec <= 2 ? 'מתעדכן...' : `עודכן לפני ${sec} שניות`;
}, 5000);
</script>
</body>
</html>
